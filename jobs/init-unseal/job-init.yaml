# Job: initialize Vault and store unseal keys + root token in a K8s Secret.
# Runs once via ArgoCD PostSync hook — deleted automatically on success.
apiVersion: batch/v1
kind: Job
metadata:
  name: vault-init
  namespace: vault
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  backoffLimit: 5
  template:
    spec:
      serviceAccountName: vault-init-sa
      restartPolicy: OnFailure
      containers:
        - name: vault-init
          image: hashicorp/vault:1.16.0
          env:
            - name: VAULT_ADDR
              value: "http://vault.vault.svc.cluster.local:8200"
          command:
            - /bin/sh
            - -c
            - |
              set -e

              echo "Checking Vault status..."
              INIT_STATUS=$(vault status -format=json 2>/dev/null | grep -o '"initialized":[a-z]*' | cut -d: -f2 || echo "false")

              if [ "$INIT_STATUS" = "true" ]; then
                echo "Vault already initialized — skipping."
                exit 0
              fi

              echo "Initializing Vault with 5 key shares, threshold 3..."
              vault operator init \
                -key-shares=5 \
                -key-threshold=3 \
                -format=json > /tmp/init.json

              echo "Parsing keys..."
              KEY1=$(cat /tmp/init.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['unseal_keys_b64'][0])")
              KEY2=$(cat /tmp/init.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['unseal_keys_b64'][1])")
              KEY3=$(cat /tmp/init.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['unseal_keys_b64'][2])")
              KEY4=$(cat /tmp/init.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['unseal_keys_b64'][3])")
              KEY5=$(cat /tmp/init.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['unseal_keys_b64'][4])")
              ROOT=$(cat /tmp/init.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['root_token'])")

              echo "Storing keys in secret vault-init-keys..."
              kubectl create secret generic vault-init-keys \
                --namespace=vault \
                --from-literal=unseal-key-1="$KEY1" \
                --from-literal=unseal-key-2="$KEY2" \
                --from-literal=unseal-key-3="$KEY3" \
                --from-literal=unseal-key-4="$KEY4" \
                --from-literal=unseal-key-5="$KEY5" \
                --from-literal=root-token="$ROOT" \
                --save-config --dry-run=client -o yaml | kubectl apply -f -

              echo "Vault initialized successfully. Keys stored in secret/vault-init-keys."
              echo "IMPORTANT: Back up the keys from the secret and then delete it after bootstrap."
