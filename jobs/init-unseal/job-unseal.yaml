# Job: unseal all Vault pods using keys stored in secret/vault-init-keys.
# Runs after vault-init via ArgoCD PostSync hook.
# Re-run this job manually whenever pods restart (e.g. after node recycle).
apiVersion: batch/v1
kind: Job
metadata:
  name: vault-unseal
  namespace: vault
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  backoffLimit: 5
  template:
    spec:
      serviceAccountName: vault-init-sa
      restartPolicy: OnFailure
      containers:
        - name: vault-unseal
          image: hashicorp/vault:1.16.0
          env:
            - name: UNSEAL_KEY_1
              valueFrom:
                secretKeyRef:
                  name: vault-init-keys
                  key: unseal-key-1
            - name: UNSEAL_KEY_2
              valueFrom:
                secretKeyRef:
                  name: vault-init-keys
                  key: unseal-key-2
            - name: UNSEAL_KEY_3
              valueFrom:
                secretKeyRef:
                  name: vault-init-keys
                  key: unseal-key-3
          command:
            - /bin/sh
            - -c
            - |
              set -e

              unseal_pod() {
                POD_NAME=$1
                export VAULT_ADDR="http://${POD_NAME}.vault-internal.vault.svc.cluster.local:8200"

                echo "Checking seal status of ${POD_NAME}..."
                SEALED=$(vault status -format=json 2>/dev/null \
                  | grep -o '"sealed":[a-z]*' | cut -d: -f2 || echo "true")

                if [ "$SEALED" = "false" ]; then
                  echo "${POD_NAME} is already unsealed — skipping."
                  return 0
                fi

                echo "Unsealing ${POD_NAME}..."
                vault operator unseal "$UNSEAL_KEY_1"
                vault operator unseal "$UNSEAL_KEY_2"
                vault operator unseal "$UNSEAL_KEY_3"
                echo "${POD_NAME} unsealed successfully."
              }

              # Unseal all HA pods
              # Dev has 1 replica, staging/prod have 3 — extra calls are safe (no-op if pod missing)
              unseal_pod vault-0 || true
              unseal_pod vault-1 || true
              unseal_pod vault-2 || true

              echo "All available Vault pods unsealed."
