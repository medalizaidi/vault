# ConfigMap holding the bootstrap shell script executed by job-bootstrap.
# The ENV, DB_HOST, DB_PASSWORD, and API_KEY values are injected
# via environment variables in job-bootstrap.yaml.
apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-bootstrap-scripts
  namespace: vault
data:
  bootstrap.sh: |
    #!/bin/sh
    set -e

    export VAULT_ADDR="http://vault.vault.svc.cluster.local:8200"

    echo "Logging in with root token..."
    vault login "$ROOT_TOKEN"

    # ── Secrets engine ─────────────────────────────────────────────
    echo "Enabling KV v2 secrets engine..."
    vault secrets list -format=json | grep -q '"secret/"' \
      || vault secrets enable -path=secret kv-v2
    echo "KV v2 ready."

    # ── Write environment secrets ──────────────────────────────────
    echo "Writing secrets for environment: ${ENV}..."
    vault kv put secret/${ENV}/myapp/config \
      db_host="${DB_HOST}" \
      db_password="${DB_PASSWORD}" \
      api_key="${API_KEY}"
    echo "Secrets written to secret/${ENV}/myapp/config"

    # ── Policy ─────────────────────────────────────────────────────
    echo "Creating policy ${ENV}-policy..."
    vault policy write ${ENV}-policy - <<EOF
    path "secret/data/${ENV}/*" {
      capabilities = ["read", "list"]
    }
    path "secret/metadata/${ENV}/*" {
      capabilities = ["list"]
    }
    EOF
    echo "Policy ${ENV}-policy created."

    # ── Kubernetes auth method ─────────────────────────────────────
    echo "Enabling Kubernetes auth method..."
    vault auth list -format=json | grep -q '"kubernetes/"' \
      || vault auth enable kubernetes

    vault write auth/kubernetes/config \
      kubernetes_host="https://${KUBERNETES_SERVICE_HOST}:${KUBERNETES_SERVICE_PORT}"
    echo "Kubernetes auth configured."

    # ── Role binding ───────────────────────────────────────────────
    echo "Creating Kubernetes auth role myapp..."
    vault write auth/kubernetes/role/myapp \
      bound_service_account_names=myapp-sa \
      bound_service_account_namespaces=default \
      policies=${ENV}-policy \
      ttl=24h
    echo "Role myapp created."

    # ── Enable audit logging (prod only — controlled by ENV var) ───
    if [ "${ENABLE_AUDIT}" = "true" ]; then
      echo "Enabling audit logging..."
      vault audit list -format=json | grep -q '"file/"' \
        || vault audit enable file file_path=/vault/audit/audit.log
      echo "Audit logging enabled."
    fi

    # ── Revoke root token ──────────────────────────────────────────
    echo "Revoking root token..."
    vault token revoke "$ROOT_TOKEN"
    echo "Root token revoked."

    echo "Bootstrap complete for environment: ${ENV}"
