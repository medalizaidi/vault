apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault-devv
  namespace: argocd
  labels:
    env: dev
    app: vault
spec:
  project: hashicorp-vault
  sources:
    # 1. Vendored Vault Helm chart with dev values
    - repoURL: https://github.com/medalizaidi/vault
      targetRevision: main
      path: charts/vault
      helm:
        releaseName: vault
        valueFiles:
          - values.yaml
          - ../../envs/values-dev.yaml

    # 2. RBAC + init/unseal/bootstrap jobs
    - repoURL: https://github.com/medalizaidi/vault
      targetRevision: main
      path: jobs/init-unseal

    - repoURL: https://github.com/medalizaidi/vault
      targetRevision: main
      path: jobs/bootstrap

    # 3. Dev-specific bootstrap secret
    - repoURL: https://github.com/medalizaidi/vault
      targetRevision: main
      path: envs/dev

  destination:
    server: https://kubernetes.default.svc  
    namespace: vault

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
