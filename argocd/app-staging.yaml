apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault-staging
  namespace: argocd
  labels:
    env: staging
    app: vault
spec:
  project: default
  sources:
    - repoURL: https://github.com/<your-org>/vault-gitops
      targetRevision: main
      path: charts/vault
      helm:
        releaseName: vault
        valueFiles:
          - values.yaml
          - ../../envs/values-staging.yaml

    - repoURL: https://github.com/<your-org>/vault-gitops
      targetRevision: main
      path: jobs/init-unseal

    - repoURL: https://github.com/<your-org>/vault-gitops
      targetRevision: main
      path: jobs/bootstrap

    - repoURL: https://github.com/<your-org>/vault-gitops
      targetRevision: main
      path: envs/staging

  destination:
    server: https://<AKS-STAGING-API-SERVER>   # replace with actual AKS staging API URL
    namespace: vault

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
