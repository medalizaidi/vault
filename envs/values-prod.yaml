# ── PROD overrides ─────────────────────────────────────────────────
server:
  ha:
    replicas: 3

  resources:
    requests:
      memory: "1Gi"
      cpu: "1000m"
    limits:
      memory: "2Gi"
      cpu: "2000m"

  dataStorage:
    size: 50Gi

  auditStorage:
    enabled: true
    size: 10Gi

  affinity: ""           # allow scheduling on any node

ui:
  enabled: false         # no UI in prod — CLI only

injector:
  enabled: true
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"
